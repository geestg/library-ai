version: "3.9"

services:

  # =========================================
  # POSTGRES
  # =========================================

  postgres:

    image: postgres:16

    container_name: libraryai_postgres

    restart: unless-stopped

    environment:

      POSTGRES_USER: ${POSTGRES_USER}

      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - ./postgres_data:/var/lib/postgresql/data

    healthcheck:

      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]

      interval: 10s

      timeout: 5s

      retries: 5

  # =========================================
  # QDRANT
  # =========================================

  qdrant:

    image: qdrant/qdrant

    container_name: libraryai_qdrant

    restart: unless-stopped

    ports:
      - "6333:6333"

    volumes:
      - ./qdrant_storage:/qdrant/storage

  # =========================================
  # MINIO
  # =========================================

  minio:

    image: minio/minio

    container_name: libraryai_minio

    restart: unless-stopped

    command: server /data --console-address ":9001"

    environment:

      MINIO_ROOT_USER: ${MINIO_ROOT_USER}

      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - ./minio_data:/data

  # =========================================
  # BACKEND
  # =========================================

  backend:

    build:
      context: ./backend

    container_name: libraryai_backend

    restart: unless-stopped

    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:

      PYTHONUNBUFFERED: 1

      PYTHONDONTWRITEBYTECODE: 1

    volumes:

      - ./backend:/app

      - ./datasets:/app/datasets

      - ./backend/uploads:/app/uploads

    extra_hosts:
      - "host.docker.internal:host-gateway"

    depends_on:

      postgres:
        condition: service_healthy

      qdrant:
        condition: service_started

      minio:
        condition: service_started

    command: >

      uvicorn app.main:app

      --host 0.0.0.0

      --port 8000

      --reload

  # =========================================
  # FRONTEND
  # =========================================

  frontend:

    build:
      context: ./frontend

    container_name: libraryai_frontend

    restart: unless-stopped

    ports:
      - "5173:5173"

    environment:

      CHOKIDAR_USEPOLLING: "true"

    volumes:

      - ./frontend:/app

      - /app/node_modules

    depends_on:
      - backend

    command: >

      npm run dev -- --host